<html>
    <head>
        <title>
            Ausbildungsnachweis-Widget
        </title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/widget-style.css">
        <script src="https://kit.fontawesome.com/aad781c8f2.js" crossorigin="anonymous"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--easyMDE markdown editor-->
        <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
        <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
    </head>
    <body>
        <div id="main-details">
            <h1>
                Ausbildungsnachweis-Tracker
            </h1>
            <div class="daterange" id="open-dropdown" onclick="toggleSelectKWs()">
                <p id="badge-kw" class="badge-kw">
                 
                </p>
                <p id="daterange-current">
                   
                </p>
                <p>
                <i id="dropdown-icon" class="fa-solid fa-arrow-down"></i>
                </p>
            </div>
            <div id="dateranges-select" class="hidden">
                <div class="daterange select">
                    <p id="badge-kw-previous" class="badge-kw">

                    </p>
                    <p id="daterange-previous">

                    </p>
                </div>
                <div class="daterange select">
                    <p id="badge-kw-next" class="badge-kw">

                    </p>
                    <p id="daterange-next">

                    </p>
                </div>
                <div class="daterange-custom">
                    <p class="badge-kw">
                        KW
                        <input type="text" id="input-custom-kw" placeholder="Kalenderwoche eingeben">
                    </p>
                    <button type="button">
                        Gehe zu
                    </button>
                </div>
            </div>
            <div id="current-day">
                <h3 id="current-day-text">

                </h3>
                <i class="fa-solid fa-bars"></i>
            </div>
            <div id="choose-days" class="hide-choose-days">
                
            </div>
        </div>
        <div class="ui-box">
            <div>
                <button type="button">
                    Tag zurück
                </button>
            </div>
        </div>
        <textarea placeholder="Hier können Sie Ihre Aktivitäten eingeben... mit Markdown" id="activities-edit"></textarea>
        <div class="ui-box">
            <div id="activities-input-with-save">
                <div id="save-day">
                    <button type="button">✓ Änderungen Speichern</button>
                </div>
            </div>
            <div>
                <button type="button">
                    Tag vor
                </button>
            </div>
        </div>
        <script type="module" src="../js/index.js"></script>
    </body>
</html>
