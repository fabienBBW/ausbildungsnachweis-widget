<html>
    <head>
        <title>
            Ausbildungsnachweisheft
        </title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../css/print_style.css" />
         <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script type="module" src="../js/templating.js"></script>
        <div id="ihk-logo">
            <img src="../res/ihk-logo.png" width="15%" height="auto"></img>
        </div>
        <hr />
        <div id="heading">
            <h1>
                Ausbildungsnachweis
            </h1>
        </div>
        <div id="personal-effects-table">
            <table>
                <tr>
                    <td>
                        <div id="pe-lastname-firstname"></div>
                        <hr />
                        Name, Vorname
                    </td>
                </tr>
                <tr>
                    <td>
                        <div id="pe-place-of-birth"></div>
                        <hr />
                        Geburtsort
                    </td>
                    <td>
                        <div id="pe-date-of-birth"></div>
                        <hr />
                        Geburtsdatum
                    </td>
                </tr>
                <tr>
                    <td>
                        <div id="pe-address"></div>
                        <hr />
                        Anschrift
                    </td>
                </tr>
                <tr>
                    <td>
                        BvB
                        <hr />
                        Ausbildungsberuf
                    </td>
                </tr>
                <tr>
                    <td>
                        BBW Südhessen gGmbH
                        <hr />
                        Ausbildungsfirma
                    </td>
                </tr>
                <tr>
                    <td>
                        04.08.2025
                        <hr />
                        Beginn der Ausbildung
                    </td>
                    <td>
                        04.08.2026
                        <hr />
                        Ende der Ausbildung
                    </td>
                    <td>
                        01
                        <hr />
                        Heft-Nr.
                    </td>
                </tr>
            </table>
        </div>

        <h1>
            Inhalt
        </h1>

        <div id="toc">
        </div>

        <div id="ausbildungsnachweise">
            
        </div>
        <button id="save-document-browser-print" type="button" onclick="window.print();">
            Print to PDF
        </button>
    </body>
</html>
