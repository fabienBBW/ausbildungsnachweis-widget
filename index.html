<html>
    <head>
        <title>
            Ausbildungsnachweis-Widget
        </title>
        <link rel="stylesheet" href="widget-style.css">
        <script src="https://kit.fontawesome.com/aad781c8f2.js" crossorigin="anonymous"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div id="main-details">
            <h1>
                Ausbildungsnachweis-Tracker
            </h1>
            <div class="daterange" id="open-dropdown" onclick="toggleSelectKWs()">
                <p>
                <i id="dropdown-icon" class="fa-solid fa-arrow-down"></i>
                </p>
                <p id="badge-kw" class="badge-kw">
                 
                </p>
                <p id="daterange-current">
                   
                </p>
            </div>
            <div id="dateranges-select" class="hidden">
                <div class="daterange select">
                    <p id="badge-kw-previous" class="badge-kw">

                    </p>
                    <p id="daterange-previous">

                    </p>
                </div>
                <div class="daterange select">
                    <p id="badge-kw-next" class="badge-kw">

                    </p>
                    <p id="daterange-next">

                    </p>
                </div>
            </div>
        </div>
        <div id="ui-box">
            <div>
                <button type="button">
                    Tag zurück
                </button>
            </div>
            <div id="activities-input-with-save">
                <div id="activities-input-list">
                    <div id="activities-input">
                        <textarea rows="3" cols="20" placeholder="Aktivität"></textarea>
                        <textarea rows="3" cols="20" placeholder="Zeitdauer"></textarea>
                        <button type="button" onclick="addNewEntry()">+</button> 
                    </div>
                </div>
                <div id="save-day">
                    <button type="button">✓ Änderungen Speichern</button>
                </div>
            </div>
            <div>
                <button type="button">
                    Tag vor
                </button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
